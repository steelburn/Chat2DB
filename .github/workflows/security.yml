name: Security and supply chain checks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript
            build-mode: none
          - language: java
            build-mode: autobuild
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0fa1882f994fbd81a47ab0804f93354f5ea40147
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@60168efe1c415ce0f5521ea06d5c2062adbeed1b
        with:
          category: /language:${{ matrix.language }}

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@ce3cf9537a52e8119d91fd484ab5b8a807627bf8

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@9246b90769f852b3a8921f330c59e0b3f439d6e9
        with:
          path: .
          format: cyclonedx-json
          artifact-name: chat2db-community-sbom.cdx.json
          upload-artifact: true

  frontend-licenses:
    name: Frontend license summary
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chat2db-community-client
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 18.17.0
          cache: yarn
          cache-dependency-path: chat2db-community-client/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check dependency licenses
        run: npx --yes license-checker@25.0.1 --production --summary
