name: Build Community Desktop Release
run-name: Community Desktop ${{ inputs.version || github.ref_name }}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Gray build version, without the v prefix'
        required: true
        type: string
      upload_cdn:
        description: 'Upload validated Community packages to the versioned CDN path'
        required: false
        default: false
        type: boolean
      update_latest_version_json:
        description: 'Update community/updates/latest_version.json after a CDN upload'
        required: false
        default: false
        type: boolean

concurrency:
  group: community-desktop-${{ github.ref }}-${{ inputs.version || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag_name: ${{ steps.metadata.outputs.tag_name }}
      publish: ${{ steps.metadata.outputs.publish }}
    steps:
      - name: Validate version
        id: metadata
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "push" ]; then
            if [[ "${REF_NAME}" != v* ]]; then
              echo "Tag must start with v: ${REF_NAME}" >&2
              exit 1
            fi
            version="${REF_NAME#v}"
            publish=true
          else
            version="${INPUT_VERSION}"
            publish=false
          fi

          if [[ ! "${version}" =~ ^(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,4})$ ]]; then
            echo "Version must use numeric SemVer without a v prefix, for example 4.0.0: ${version}" >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          if [ "${major}" -lt 4 ]; then
            echo "Public Community releases start at major version 4: ${version}" >&2
            exit 1
          fi
          if [ "${major}" -gt 255 ] || [ "${minor}" -gt 255 ] || [ "${patch}" -gt 65535 ]; then
            echo "Version exceeds the Windows MSI version limits: ${version}" >&2
            exit 1
          fi

          {
            echo "version=${version}"
            echo "tag_name=v${version}"
            echo "publish=${publish}"
          } >> "${GITHUB_OUTPUT}"

  notify_start:
    name: Notify Feishu Community gray build start
    needs: resolve
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Feishu start notification
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_RELEASE_NOTIFY_WEBHOOK }}
          VERSION: ${{ needs.resolve.outputs.version }}
          UPLOAD_CDN: ${{ inputs.upload_cdn }}
          UPDATE_LATEST_VERSION_JSON: ${{ inputs.update_latest_version_json }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: python
        run: |
          import json
          import os
          import urllib.error
          import urllib.request

          webhook = os.environ.get("FEISHU_WEBHOOK_URL", "")
          if not webhook:
              print("FEISHU_RELEASE_NOTIFY_WEBHOOK is not configured; skip start notification.")
              raise SystemExit(0)

          lines = [
              "Chat2DB Community 灰度构建已开始",
              f"版本：{os.environ['VERSION']}",
              f"上传 CDN：{os.environ['UPLOAD_CDN']}",
              f"更新 latest_version.json：{os.environ['UPDATE_LATEST_VERSION_JSON']}",
              f"运行链接：{os.environ['RUN_URL']}",
          ]
          payload = json.dumps(
              {"msg_type": "text", "content": {"text": "\n".join(lines)}},
              ensure_ascii=False,
          ).encode("utf-8")
          request = urllib.request.Request(
              webhook,
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=15) as response:
                  result = json.loads(response.read().decode("utf-8"))
              if result.get("code", 0) != 0:
                  print(f"::warning::Feishu start notification was rejected: {result}")
          except urllib.error.URLError as exc:
              print(f"::warning::Feishu start notification failed: {exc}")

  build:
    name: Build ${{ matrix.artifact_name }}
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: mac
            artifact_name: macos-arm64
          - os: macos-15-intel
            target: mac
            artifact_name: macos-x64
          - os: windows-latest
            target: win
            artifact_name: windows
          - os: ubuntu-22.04
            target: linux
            artifact_name: linux-x64
          - os: ubuntu-22.04-arm
            target: linux
            artifact_name: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '18.17.0'
          cache: yarn
          cache-dependency-path: chat2db-community-client/yarn.lock

      - name: Install Ubuntu packaging dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot rpm desktop-file-utils file curl zip

      - name: Import macOS code-signing certificate
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.MAC_CERTS }}" | base64 --decode > certificate.p12
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain"
          security create-keychain -p "${{ secrets.MAC_CERTS_PASSWORD }}" "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${{ secrets.MAC_CERTS_PASSWORD }}" "${KEYCHAIN_PATH}"
          security import certificate.p12 -k "${KEYCHAIN_PATH}" -P "${{ secrets.MAC_CERTS_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "${{ secrets.MAC_CERTS_PASSWORD }}" "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning

      - name: Resolve macOS signing identity
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          set -euo pipefail
          SIGN_ID="${MAC_SIGNING_IDENTITY:-}"
          if [ -n "${SIGN_ID}" ] && ! security find-identity -v -p codesigning | grep -F "${SIGN_ID}" >/dev/null; then
            echo "Configured macOS signing identity not found: ${SIGN_ID}" >&2
            SIGN_ID=""
          fi
          if [ -z "${SIGN_ID}" ]; then
            SIGN_ID="$(security find-identity -v -p codesigning | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          fi
          if [ -z "${SIGN_ID}" ]; then
            echo "Error: no Developer ID Application signing identity found in keychain" >&2
            security find-identity -v -p codesigning || true
            exit 1
          fi
          echo "Using macOS signing identity: ${SIGN_ID}"
          echo "MAC_SIGNING_IDENTITY=${SIGN_ID}" >> "${GITHUB_ENV}"

      - name: Build Community desktop package
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          script/package/package-community-jcef.sh "${VERSION}" "${TARGET}"

      - name: Notarize macOS package
        if: ${{ runner.os == 'macOS' }}
        timeout-minutes: 30
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          MAC_APPLE_ID: ${{ secrets.MAC_APPLE_ID }}
          MAC_APPLE_PASSWORD: ${{ secrets.MAC_APPLE_PASSWORD }}
          MAC_TEAM_ID: ${{ secrets.MAC_TEAM_ID }}
        run: |
          set -euo pipefail

          for required in MAC_APPLE_ID MAC_APPLE_PASSWORD MAC_TEAM_ID; do
            if [ -z "${!required}" ]; then
              echo "Missing required notarization secret: ${required}" >&2
              exit 1
            fi
          done

          case "${ARTIFACT_NAME}" in
            macos-arm64) dmg="jpackage/output/Chat2DB-Community-${VERSION}-arm64.dmg" ;;
            macos-x64) dmg="jpackage/output/Chat2DB-Community-${VERSION}-x64.dmg" ;;
            *)
              echo "Unexpected macOS artifact name: ${ARTIFACT_NAME}" >&2
              exit 1
              ;;
          esac
          test -s "${dmg}"

          xcrun notarytool submit "${dmg}" \
            --apple-id "${MAC_APPLE_ID}" \
            --password "${MAC_APPLE_PASSWORD}" \
            --team-id "${MAC_TEAM_ID}" \
            --wait
          xcrun stapler staple "${dmg}"
          xcrun stapler validate "${dmg}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: chat2db-community-${{ needs.resolve.outputs.version }}-${{ matrix.artifact_name }}
          if-no-files-found: error
          overwrite: true
          path: |
            jpackage/output/*.dmg
            jpackage/output/*.msi
            jpackage/output/*.deb
            jpackage/output/*.rpm
            jpackage/output/*.AppImage
            jpackage/input/sourceFile/version.json
            jpackage/input/sourceFile/local_version.json
            jpackage/input/sourceFile/*.jar
            jpackage/input/sourceFile/*.zip

  cdn_release:
    name: Publish Community packages to CDN
    needs:
      - resolve
      - build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_cdn }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Download platform artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: chat2db-community-${{ needs.resolve.outputs.version }}-*
          path: downloaded-artifacts

      - name: Validate CDN bundle and generate manifest
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          CDN_BASE_URL: https://cdn.chat2db-ai.com
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          expected=(
            "Chat2DB-Community-${VERSION}-arm64.dmg"
            "Chat2DB-Community-${VERSION}-x64.dmg"
            "Chat2DB-Community-${VERSION}.msi"
            "Chat2DB-Community-${VERSION}-amd64.deb"
            "Chat2DB-Community-${VERSION}-arm64.deb"
            "Chat2DB-Community-${VERSION}-x86_64.rpm"
            "Chat2DB-Community-${VERSION}-aarch64.rpm"
            "Chat2DB-Community-${VERSION}-x86_64.AppImage"
            "Chat2DB-Community-${VERSION}-arm64.AppImage"
          )

          mapfile -d '' installers < <(
            find downloaded-artifacts -type f \
              \( -name '*.dmg' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) \
              -print0
          )
          if [ "${#installers[@]}" -ne "${#expected[@]}" ]; then
            echo "Expected ${#expected[@]} installers, found ${#installers[@]}" >&2
            printf ' - %s\n' "${installers[@]}" >&2
            exit 1
          fi

          mkdir -p cdn-assets/release cdn-assets/updates
          for asset in "${expected[@]}"; do
            mapfile -t matches < <(find downloaded-artifacts -type f -name "${asset}")
            if [ "${#matches[@]}" -ne 1 ]; then
              echo "Expected exactly one ${asset}, found ${#matches[@]}" >&2
              exit 1
            fi
            test -s "${matches[0]}"
            cp "${matches[0]}" "cdn-assets/release/${asset}"
          done

          windows_artifact_dir="downloaded-artifacts/chat2db-community-${VERSION}-windows"
          test -d "${windows_artifact_dir}" || {
            echo "Windows artifact directory is missing: ${windows_artifact_dir}" >&2
            exit 1
          }
          for payload in version.json chat2db-community.jar lib.zip dist.zip; do
            mapfile -t matches < <(find "${windows_artifact_dir}" -type f -name "${payload}")
            if [ "${#matches[@]}" -ne 1 ]; then
              echo "Expected exactly one Windows update payload ${payload}, found ${#matches[@]}" >&2
              exit 1
            fi
            test -s "${matches[0]}"
            cp "${matches[0]}" "cdn-assets/updates/${payload}"
          done

          (
            cd cdn-assets/release
            sha256sum "${expected[@]}" > SHA256SUMS
          )

          VERSION="${VERSION}" CDN_BASE_URL="${CDN_BASE_URL}" RUN_URL="${RUN_URL}" python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          release_dir = Path("cdn-assets/release")
          files = []
          for path in sorted(release_dir.iterdir()):
              if path.name == "SHA256SUMS":
                  continue
              files.append(
                  {
                      "name": path.name,
                      "size": path.stat().st_size,
                      "sha256": hashlib.sha256(path.read_bytes()).hexdigest(),
                      "url": f"{os.environ['CDN_BASE_URL']}/community/{os.environ['VERSION']}/{path.name}",
                  }
              )

          manifest = {
              "edition": "Chat2DB Community",
              "version": os.environ["VERSION"],
              "channel": "gray",
              "run_url": os.environ["RUN_URL"],
              "files": files,
          }
          Path("cdn-assets/release-manifest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Set up ossutil
        uses: yizhoumo/setup-ossutil@02384914fef2758596b303e2035c47b8c3f80fb2
        with:
          endpoint: oss-us-west-1.aliyuncs.com
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          ossutil-version: '1.7.16'

      - name: Upload validated Community packages to CDN
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          OSS_BUCKET_NAME: chat2db-cdn
          CDN_BASE_URL: https://cdn.chat2db-ai.com
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_RELEASE_NOTIFY_WEBHOOK }}
          UPDATE_LATEST_VERSION_JSON: ${{ inputs.update_latest_version_json }}
        run: |
          set -euo pipefail

          send_package_notification() {
            local package_name="$1"
            local package_url="$2"
            PACKAGE_NAME="${package_name}" PACKAGE_URL="${package_url}" python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          webhook = os.environ.get("FEISHU_WEBHOOK_URL", "")
          if not webhook:
              print("FEISHU_RELEASE_NOTIFY_WEBHOOK is not configured; skip package notification.")
              raise SystemExit(0)

          text = "\n".join(
              [
                  "Chat2DB Community 灰度包已上传 CDN",
                  f"版本：{os.environ['VERSION']}",
                  f"包名：{os.environ['PACKAGE_NAME']}",
                  f"下载链接：{os.environ['PACKAGE_URL']}",
              ]
          )
          payload = json.dumps(
              {"msg_type": "text", "content": {"text": text}}, ensure_ascii=False
          ).encode("utf-8")
          request = urllib.request.Request(
              webhook,
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=15) as response:
                  result = json.loads(response.read().decode("utf-8"))
              if result.get("code", 0) != 0:
                  print(f"::warning::Feishu package notification was rejected: {result}")
          except urllib.error.URLError as exc:
              print(f"::warning::Feishu package notification failed: {exc}")
          PY
          }

          for file in cdn-assets/release/*; do
            name="$(basename "${file}")"
            destination="oss://${OSS_BUCKET_NAME}/community/${VERSION}/${name}"
            ossutil cp -f "${file}" "${destination}"
            ossutil stat "${destination}" >/dev/null
            if [ "${name}" != "SHA256SUMS" ]; then
              send_package_notification "${name}" "${CDN_BASE_URL}/community/${VERSION}/${name}"
            fi
          done

          for file in cdn-assets/updates/*; do
            name="$(basename "${file}")"
            destination="oss://${OSS_BUCKET_NAME}/community/updates/${VERSION}/${name}"
            ossutil cp -f "${file}" "${destination}"
            ossutil stat "${destination}" >/dev/null
          done

          if [ "${UPDATE_LATEST_VERSION_JSON}" = "true" ]; then
            VERSION="${VERSION}" CDN_BASE_URL="${CDN_BASE_URL}" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "latestVersion": os.environ["VERSION"],
              "metadataUrl": f"{os.environ['CDN_BASE_URL']}/community/updates/{os.environ['VERSION']}/version.json",
              "forceUpdate": False,
          }
          Path("cdn-assets/latest_version.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
            destination="oss://${OSS_BUCKET_NAME}/community/updates/latest_version.json"
            ossutil cp -f cdn-assets/latest_version.json "${destination}"
            ossutil stat "${destination}" >/dev/null
          fi

          manifest_destination="oss://${OSS_BUCKET_NAME}/community/${VERSION}/release-manifest.json"
          ossutil cp -f cdn-assets/release-manifest.json "${manifest_destination}"
          ossutil stat "${manifest_destination}" >/dev/null

      - name: Upload CDN distribution receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: community-cdn-receipt-${{ needs.resolve.outputs.version }}
          if-no-files-found: error
          overwrite: true
          path: |
            cdn-assets/release/SHA256SUMS
            cdn-assets/release-manifest.json

  notify_summary:
    name: Notify Feishu Community gray build summary
    needs:
      - resolve
      - build
      - cdn_release
    if: ${{ always() && github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Send Feishu summary notification
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_RELEASE_NOTIFY_WEBHOOK }}
          VERSION: ${{ needs.resolve.outputs.version || inputs.version }}
          BUILD_RESULT: ${{ needs.build.result }}
          CDN_RESULT: ${{ needs.cdn_release.result }}
          UPLOAD_CDN: ${{ inputs.upload_cdn }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_TOKEN: ${{ github.token }}
        shell: python
        run: |
          import json
          import os
          import urllib.error
          import urllib.request

          webhook = os.environ.get("FEISHU_WEBHOOK_URL", "")
          if not webhook:
              print("FEISHU_RELEASE_NOTIFY_WEBHOOK is not configured; skip summary notification.")
              raise SystemExit(0)

          def failed_build_jobs():
              request = urllib.request.Request(
                  f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}/jobs?per_page=100",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=15) as response:
                      jobs = json.loads(response.read().decode("utf-8")).get("jobs", [])
              except Exception as exc:
                  return [f"- 无法读取 job 详情：{exc}"]

              failed = []
              for job in jobs:
                  name = job.get("name", "")
                  conclusion = job.get("conclusion") or job.get("status") or "unknown"
                  if name.startswith("Build ") and conclusion != "success":
                      failed.append(f"- {name}: {conclusion}")
              return failed or ["- 未获取到失败构建 job，请查看运行链接"]

          version = os.environ["VERSION"]
          build_result = os.environ["BUILD_RESULT"]
          cdn_result = os.environ["CDN_RESULT"]
          upload_cdn = os.environ["UPLOAD_CDN"]
          run_url = os.environ["RUN_URL"]

          if build_result == "success" and (upload_cdn != "true" or cdn_result == "success"):
              lines = [
                  "Chat2DB Community 灰度构建完成",
                  f"版本：{version}",
                  f"构建结果：{build_result}",
              ]
              if upload_cdn == "true":
                  lines.extend(
                      [
                          "CDN 上传：success",
                          f"下载目录：https://cdn.chat2db-ai.com/community/{version}/",
                          f"更新元数据：https://cdn.chat2db-ai.com/community/updates/{version}/version.json",
                      ]
                  )
              else:
                  lines.append("CDN 上传：未请求，安装包仅保留在 GitHub Actions artifacts。")
              lines.append(f"运行链接：{run_url}")
          else:
              lines = [
                  "Chat2DB Community 灰度构建未全部成功",
                  f"版本：{version}",
                  f"构建结果：{build_result}",
                  f"CDN 结果：{cdn_result}",
                  "失败构建 job：",
                  *failed_build_jobs(),
                  f"运行链接：{run_url}",
              ]

          payload = json.dumps(
              {"msg_type": "text", "content": {"text": "\n".join(lines)}},
              ensure_ascii=False,
          ).encode("utf-8")
          request = urllib.request.Request(
              webhook,
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(request, timeout=15) as response:
                  result = json.loads(response.read().decode("utf-8"))
              if result.get("code", 0) != 0:
                  print(f"::warning::Feishu summary notification was rejected: {result}")
          except urllib.error.URLError as exc:
              print(f"::warning::Feishu summary notification failed: {exc}")

  stage_release:
    name: Validate and stage GitHub Release
    needs:
      - resolve
      - build
    if: ${{ needs.resolve.outputs.publish == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download platform artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: chat2db-community-${{ needs.resolve.outputs.version }}-*
          path: downloaded-artifacts

      - name: Validate release assets and generate checksums
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          expected=(
            "Chat2DB-Community-${VERSION}-arm64.dmg"
            "Chat2DB-Community-${VERSION}-x64.dmg"
            "Chat2DB-Community-${VERSION}.msi"
            "Chat2DB-Community-${VERSION}-amd64.deb"
            "Chat2DB-Community-${VERSION}-arm64.deb"
            "Chat2DB-Community-${VERSION}-x86_64.rpm"
            "Chat2DB-Community-${VERSION}-aarch64.rpm"
            "Chat2DB-Community-${VERSION}-x86_64.AppImage"
            "Chat2DB-Community-${VERSION}-arm64.AppImage"
          )

          mapfile -d '' installers < <(
            find downloaded-artifacts -type f \
              \( -name '*.dmg' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) \
              -print0
          )
          if [ "${#installers[@]}" -ne "${#expected[@]}" ]; then
            echo "Expected ${#expected[@]} installers, found ${#installers[@]}" >&2
            printf ' - %s\n' "${installers[@]}" >&2
            exit 1
          fi

          mkdir -p release-assets
          for asset in "${expected[@]}"; do
            mapfile -t matches < <(find downloaded-artifacts -type f -name "${asset}")
            if [ "${#matches[@]}" -ne 1 ]; then
              echo "Expected exactly one ${asset}, found ${#matches[@]}" >&2
              exit 1
            fi
            test -s "${matches[0]}"
            cp "${matches[0]}" "release-assets/${asset}"
          done

          (
            cd release-assets
            sha256sum "${expected[@]}" > SHA256SUMS
          )

      - name: Upload validated release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: community-release-bundle-${{ needs.resolve.outputs.version }}
          if-no-files-found: error
          overwrite: true
          path: release-assets/*

      - name: Create or refresh draft Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.resolve.outputs.tag_name }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail

          if draft=$(gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft' 2>/dev/null); then
            if [ "${draft}" != "true" ]; then
              echo "Release ${TAG_NAME} is already published; refusing to replace it" >&2
              exit 1
            fi
            gh release upload "${TAG_NAME}" release-assets/* --clobber
          else
            gh release create "${TAG_NAME}" release-assets/* \
              --verify-tag \
              --draft \
              --generate-notes \
              --title "Chat2DB Community ${VERSION}"
          fi

          find release-assets -maxdepth 1 -type f -exec basename {} \; | sort > expected-assets.txt
          gh release view "${TAG_NAME}" --json assets --jq '.assets[].name' | sort > actual-assets.txt
          diff -u expected-assets.txt actual-assets.txt

  docker:
    name: Publish Docker image
    needs:
      - resolve
      - stage_release
    if: ${{ needs.resolve.outputs.publish == 'true' }}
    uses: ./.github/workflows/pushdocker.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
      push_latest: true
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  publish_release:
    name: Publish GitHub Release
    needs:
      - resolve
      - stage_release
      - docker
    if: ${{ needs.resolve.outputs.publish == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish validated Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.resolve.outputs.tag_name }}
        run: |
          set -euo pipefail
          gh release edit "${TAG_NAME}" --draft=false --latest
          test "$(gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft')" = "false"
